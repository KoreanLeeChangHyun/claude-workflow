<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Terminal</title>
<link rel="stylesheet" href="css/core/common.css">
<link rel="stylesheet" href="css/terminal/layout-and-message.css">
<link rel="stylesheet" href="css/terminal/tool-box.css">
<link rel="stylesheet" href="css/terminal/renderers.css">
<link rel="stylesheet" href="css/terminal/workflow-panels.css">
<link rel="stylesheet" href="css/vendor/highlight-github-dark.min.css">
<link rel="stylesheet" href="css/core/modal.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: #1e1e1e;
    color-scheme: dark;
  }
  #terminal-standalone {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #terminal-standalone .terminal-container {
    height: 100vh;
  }
</style>
</head>
<body>

<div id="terminal-standalone"></div>

<script src="js/vendor/marked-15.0.0.min.js"></script>
<script src="js/vendor/highlight-11.11.1.min.js"></script>
<script async src="js/vendor/mermaid-11.4.1.min.js" onload="mermaid.initialize({startOnLoad:false,theme:'dark',suppressErrors:true})"></script>
<script>
(function(){
  if(typeof hljs==='undefined')return;
  var langs=['javascript','typescript','python','bash','css','xml','json'];
  var base='js/vendor/highlight-languages/';
  var i=0;
  function loadNext(){
    if(i>=langs.length){hljs.configure({ignoreUnescapedHTML:true});return;}
    var s=document.createElement('script');s.src=base+langs[i++]+'.min.js';
    s.onload=loadNext;s.onerror=loadNext;document.head.appendChild(s);
  }
  loadNext();
})();
</script>
<script src="js/core/common.js"></script>
<script src="js/terminal/tool-renderers.js"></script>
<script src="js/terminal/output-pipe.js"></script>
<script src="js/terminal/tool-box.js?v=20260509-notitle"></script>
<script src="js/terminal/attachment-card.js"></script>
<script src="js/terminal/terminal-input.js"></script>
<script src="js/terminal/session-switcher.js"></script>
<script src="js/workflow/workflow-bar.js"></script>
<script src="js/core/slash-commands.js"></script>
<!-- T-495 P2 — v2 driver subprocess 전용 REST/SSE client (Board.v2Workflow).
     반드시 workflow-sessions.js / session.js 보다 먼저 로드 (의존 측에서 Board.v2Workflow.* 호출). -->
<script src="js/workflow/v2-workflow.js"></script>
<!-- T-495 P3 — v2 산출물/로그/metrics viewer (Board.v2Viewer).
     v2-workflow.js 의 artifactUrl / fetchArtifact 에 의존. -->
<script src="js/workflow/v2-viewer.js"></script>
<script src="js/workflow/workflow-sessions.js"></script>
<script src="js/terminal/wf-ticket-renderer.js"></script>
<script src="js/workflow/session.js"></script>
<!-- memory-core: Quick Prompts API 헬퍼 (Board.fetch.getQuickPromptText) 등록.
     terminal.js 의 Memory 버튼 핸들러가 이 헬퍼를 사용하므로 반드시 terminal.js 이전에 로드. -->
<script src="js/memory/memory-core.js"></script>
<script src="js/terminal/terminal-branch-sync.js"></script>
<script src="js/terminal/terminal.js"></script>
<script>
  // Standalone initialization — invoke renderTerminal immediately.
  // Board namespace and state are already initialized by common.js.
  // terminal.js detects standalone mode via absence of #view-terminal.
  (function () {
    if (Board.render && Board.render.renderTerminal) {
      Board.render.renderTerminal();
    }
  })();
</script>
</body>
</html>
