# claude-workflow (Organic Engineering) — 프로젝트 로드맵
#
# 본 파일은 메모리 `project_design_direction.md` (2026-04-23 작성, 357줄) 의 정식 이관처다.
# 기존 메모리는 archived 표기 후 보존하고, 향후 모든 비전·미구현 항목 갱신은 이 파일에서 한다.
#
# 구조:
#   - phases[]: 큰 영역 (조직/시스템 차원의 한 덩어리)
