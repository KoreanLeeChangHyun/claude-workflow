<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Terminal</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/terminal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: #1e1e1e;
    color-scheme: dark;
  }
  #terminal-standalone {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #terminal-standalone .terminal-container {
    height: 100vh;
  }
</style>
</head>
<body>

<div id="terminal-standalone"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/highlight.min.js"></script>
<script>
(function(){
  if(typeof hljs==='undefined')return;
  var langs=['javascript','typescript','python','bash','css','xml','json'];
  var base='https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/';
  var i=0;
  function loadNext(){
    if(i>=langs.length){hljs.configure({ignoreUnescapedHTML:true});return;}
    var s=document.createElement('script');s.src=base+langs[i++]+'.min.js';
    s.onload=loadNext;s.onerror=loadNext;document.head.appendChild(s);
  }
  loadNext();
})();
</script>
<script src="js/common.js"></script>
<script src="js/renderers.js"></script>
<script src="js/workflow-bar.js"></script>
<script src="js/slash-commands.js"></script>
<script src="js/workflow-sessions.js"></script>
<script src="js/session.js"></script>
<script src="js/terminal.js"></script>
<script>
  // Standalone initialization — invoke renderTerminal immediately.
  // Board namespace and state are already initialized by common.js.
  // terminal.js detects standalone mode via absence of #view-terminal.
  (function () {
    if (Board.render && Board.render.renderTerminal) {
      Board.render.renderTerminal();
    }
  })();
</script>
</body>
</html>
