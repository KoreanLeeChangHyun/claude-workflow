# ==============================================================================
# defaults.conf — build.sh 상수 정의
# build.sh가 source로 로드하는 파일입니다.
# ==============================================================================

# --- .settings/.env에서 설정값 로드 (있으면 오버라이드, 없으면 아래 기본값 사용) ---
# .settings 우선 참조, 없으면 .env 폴백 (하위 호환)
if [[ -f ".claude.workflow/.settings" ]]; then
    _ENV_FILE="${_ENV_FILE:-.claude.workflow/.settings}"
else
    _ENV_FILE="${_ENV_FILE:-.claude.workflow/.env}"
fi
if [[ -f "$_ENV_FILE" ]]; then
    _val=$(grep -E '^CLAUDE_REQUIRED_PYTHON_MAJOR=' "$_ENV_FILE" 2>/dev/null | head -1 | cut -d= -f2)
    [[ -n "$_val" ]] && REQUIRED_PYTHON_MAJOR="$_val"
    _val=$(grep -E '^CLAUDE_REQUIRED_PYTHON_MINOR=' "$_ENV_FILE" 2>/dev/null | head -1 | cut -d= -f2)
    [[ -n "$_val" ]] && REQUIRED_PYTHON_MINOR="$_val"
    _val=$(grep -E '^CLAUDE_REPO_URL=' "$_ENV_FILE" 2>/dev/null | head -1 | cut -d= -f2)
    [[ -n "$_val" ]] && CLAUDE_REPO_URL="$_val"
    unset _val
fi
unset _ENV_FILE

# --- Python 최소 버전 (기본값, .env에서 오버라이드 가능) ---
REQUIRED_PYTHON_MAJOR=${REQUIRED_PYTHON_MAJOR:-3}
REQUIRED_PYTHON_MINOR=${REQUIRED_PYTHON_MINOR:-10}

# --- 생성할 디렉터리 목록 ---
INIT_DIRS=(".claude.workflow/kanban" ".claude.workflow/kanban/active" ".claude.workflow/kanban/done" ".claude.workflow/kanban/open" ".claude.workflow/kanban/progress" ".claude.workflow/kanban/review" ".claude.workflow/workflow/.history" ".claude.workflow/workflow/.temp")

# --- 생성할 파일 목록 (존재하지 않는 경우만 touch) ---
INIT_FILES=(".claude.workflow/kanban/.memo.txt" ".claude.workflow/kanban/.todo.txt" "CLAUDE.md")

# --- .gitignore 필수 항목 ---
GITIGNORE_ENTRIES=(
    " "
    ".claude.workflow/workflow/"
    ".claude/"
    ".claude.workflow/.settings"
    ".claude.workflow/.env"
    ".claude.workflow/.env*"
    ".claude.workflow/kanban/**/*.xml"
    "CLAUDE.md"
    "__pycache__/"
    ".temp/"
    ".temp/*"
    "temp/"
    ".vscode/"
    ".claude.workflow/dashboard/"
)

# --- 원격 저장소 URL (기본값, .env에서 오버라이드 가능) ---
CLAUDE_REPO_URL="${CLAUDE_REPO_URL:-https://github.com/KoreanLeeChangHyun/claude-workflow.git}"

# --- 템플릿 파일 경로 (스크립트 기준 상대 경로) ---
TMPL_DIR=".claude.workflow/init/templates"
TMPL_SETTINGS="${TMPL_DIR}/settings.json.tmpl"
TMPL_CLAUDE_ENV="${TMPL_DIR}/claude-env.tmpl"
TMPL_CLAUDE_ALIASES="${TMPL_DIR}/claude-aliases.tmpl"
