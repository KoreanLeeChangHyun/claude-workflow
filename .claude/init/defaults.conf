# ==============================================================================
# defaults.conf — init-claude-workflow.sh 상수 정의
# init-claude-workflow.sh가 source로 로드하는 파일입니다.
# ==============================================================================

# --- Python 최소 버전 ---
REQUIRED_PYTHON_MAJOR=3
REQUIRED_PYTHON_MINOR=10

# --- 생성할 디렉터리 목록 ---
INIT_DIRS=(".kanban" ".kanban/active" ".kanban/done" ".workflow/.history" ".workflow/.temp")

# --- 생성할 파일 목록 (존재하지 않는 경우만 touch) ---
INIT_FILES=(".kanban/.memo.txt" ".kanban/.todo.txt" "CLAUDE.md")

# --- .gitignore 필수 항목 ---
GITIGNORE_ENTRIES=(
    " "
    ".workflow/"
    ".claude/"
    ".claude.env"
    ".claude.env*"
    ".kanban/"
    "CLAUDE.md"
    "__pycache__/"
    ".temp/"
    ".temp/*"
    "temp/"
    ".vscode/"
    ".dashboard/"
)

# --- 원격 저장소 URL ---
CLAUDE_REPO_URL="https://github.com/KoreanLeeChangHyun/claude-workflow.git"

# --- 템플릿 파일 경로 (스크립트 기준 상대 경로) ---
TMPL_DIR=".claude/init/templates"
TMPL_SETTINGS="${TMPL_DIR}/settings.json.tmpl"
TMPL_CLAUDE_ENV="${TMPL_DIR}/claude-env.tmpl"
TMPL_CLAUDE_ALIASES="${TMPL_DIR}/claude-aliases.tmpl"
