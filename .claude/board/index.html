<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Workflow</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/kanban.css">
<link rel="stylesheet" href="css/viewer.css">
<link rel="stylesheet" href="css/workflow.css">
</head>
<body data-server-no-reload>

<header class="header">
  <div class="header-title"><span class="accent">Claude Code</span> Workflow</div>
  <nav class="tabs">
    <button class="tab active" data-view="dashboard">Dashboard</button>
    <button class="tab" data-view="kanban">Kanban</button>
    <button class="tab" data-view="workflow">Workflow</button>
    <button class="tab" data-view="viewer">Viewer</button>
  </nav>
</header>

<main class="main" id="main">
  <div class="view active" id="view-kanban"></div>
  <div class="view" id="view-dashboard"></div>
  <div class="view" id="view-workflow"></div>
  <div class="view" id="view-viewer"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
<link id="hljs-theme-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
<link id="hljs-theme-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" media="(prefers-color-scheme: light)">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/highlight.min.js" onload="(function(){var langs=['javascript','typescript','python','css','xml'];var base='https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/languages/';var loaded=0;langs.forEach(function(lang){var s=document.createElement('script');s.src=base+lang+'.min.js';s.onload=function(){loaded++;if(loaded===langs.length){hljs.configure({ignoreUnescapedHTML:true});}};document.head.appendChild(s);});})();"></script>
<script src="js/common.js"></script>
<script src="js/kanban.js"></script>
<script src="js/viewer.js"></script>
<script src="js/workflow.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/sse.js"></script>
</body>
</html>
